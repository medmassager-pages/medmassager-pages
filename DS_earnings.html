
<style>
  .wrap { padding: 1rem 0; font-size: 13px; color: var(--color-text-primary); }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  .control-group { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 14px 16px; }
  .group-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-label { font-size: 12px; color: var(--color-text-secondary); width: 44px; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; }
  .slider-val { font-size: 12px; font-weight: 500; width: 38px; text-align: right; flex-shrink: 0; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; }
  .mlabel { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
  .mval { font-size: 19px; font-weight: 500; }
  .msub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary); flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 16px; table-layout: fixed; }
  th { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-align: right; padding: 5px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; }
  th:first-child { text-align: left; }
  td { text-align: right; padding: 5px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  td:first-child { text-align: left; font-weight: 500; }
  tr:last-child td { border-bottom: none; font-weight: 500; background: var(--color-background-secondary); }
  .pos { color: #27500A; font-weight: 500; }
  .base-row td { color: var(--color-text-secondary); font-style: italic; font-weight: 400; }
</style>

<div class="wrap">

<div class="controls">
  <div class="control-group">
    <div class="group-label">E-commerce growth % per year</div>
    <div class="slider-row"><span class="slider-label">2026</span><input type="range" min="0" max="80" step="1" value="20" id="ec0"><span class="slider-val" id="ecv0">20%</span></div>
    <div class="slider-row"><span class="slider-label">2027</span><input type="range" min="0" max="80" step="1" value="20" id="ec1"><span class="slider-val" id="ecv1">20%</span></div>
    <div class="slider-row"><span class="slider-label">2028</span><input type="range" min="0" max="80" step="1" value="20" id="ec2"><span class="slider-val" id="ecv2">20%</span></div>
    <div class="slider-row"><span class="slider-label">2029</span><input type="range" min="0" max="80" step="1" value="20" id="ec3"><span class="slider-val" id="ecv3">20%</span></div>
    <div class="slider-row"><span class="slider-label">2030</span><input type="range" min="0" max="80" step="1" value="20" id="ec4"><span class="slider-val" id="ecv4">20%</span></div>
  </div>
  <div class="control-group">
    <div class="group-label">Wholesale growth % per year</div>
    <div class="slider-row"><span class="slider-label">2026</span><input type="range" min="0" max="80" step="1" value="20" id="ws0"><span class="slider-val" id="wsv0">20%</span></div>
    <div class="slider-row"><span class="slider-label">2027</span><input type="range" min="0" max="80" step="1" value="20" id="ws1"><span class="slider-val" id="wsv1">20%</span></div>
    <div class="slider-row"><span class="slider-label">2028</span><input type="range" min="0" max="80" step="1" value="20" id="ws2"><span class="slider-val" id="wsv2">20%</span></div>
    <div class="slider-row"><span class="slider-label">2029</span><input type="range" min="0" max="80" step="1" value="20" id="ws3"><span class="slider-val" id="wsv3">20%</span></div>
    <div class="slider-row"><span class="slider-label">2030</span><input type="range" min="0" max="80" step="1" value="20" id="ws4"><span class="slider-val" id="wsv4">20%</span></div>
  </div>
</div>

<div class="metrics" id="metrics"></div>

<div class="legend">
  <span><span class="swatch" style="background:#185FA5;"></span>E-commerce bonus</span>
  <span><span class="swatch" style="background:#1D9E75;"></span>Wholesale bonus</span>
  <span><span class="swatch" style="background:#D3D1C7;"></span>Base retainer ($156K)</span>
</div>

<div style="position:relative;width:100%;height:300px;">
  <canvas id="mainChart"></canvas>
</div>

<table>
  <thead>
    <tr>
      <th>Year</th>
      <th>EC rev</th>
      <th>EC growth</th>
      <th>EC bonus</th>
      <th>WS rev</th>
      <th>WS growth</th>
      <th>WS bonus</th>
      <th>Total comp</th>
      <th>% of rev</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const BASE = 156000;
const EC_BASE = 6000000;
const WS_BASE = 6000000;
const YEARS = [2025,2026,2027,2028,2029,2030];

function calcECBonus(rev) {
  let inc = rev - EC_BASE;
  if (inc <= 0) return 0;
  let b = 0;
  const t1 = Math.min(inc,3000000); b += t1*0.04; inc -= t1; if(inc<=0) return b;
  const t2 = Math.min(inc,3000000); b += t2*0.06; inc -= t2; if(inc<=0) return b;
  const t3 = Math.min(inc,4000000); b += t3*0.08; inc -= t3; if(inc<=0) return b;
  return b + inc*0.10;
}
function calcWSBonus(rev) {
  let inc = rev - WS_BASE;
  if (inc <= 0) return 0;
  let b = 0;
  const t1 = Math.min(inc,3000000); b += t1*0.03; inc -= t1; if(inc<=0) return b;
  const t2 = Math.min(inc,3000000); b += t2*0.04; inc -= t2; if(inc<=0) return b;
  const t3 = Math.min(inc,4000000); b += t3*0.05; inc -= t3; if(inc<=0) return b;
  return b + inc*0.06;
}

function fmt(n) { return '$'+Math.round(n).toLocaleString(); }
function fmtM(n) { return '$'+(n/1000000).toFixed(1)+'M'; }
function pct(n,d) { return (n/d*100).toFixed(1)+'%'; }
function gpct(n) { return '+'+n+'%'; }

function getSliders() {
  const ec = [], ws = [];
  for(let i=0;i<5;i++) {
    ec.push(parseInt(document.getElementById('ec'+i).value));
    ws.push(parseInt(document.getElementById('ws'+i).value));
  }
  return {ec,ws};
}

function calcRows() {
  const {ec,ws} = getSliders();
  const rows = [];
  let ecRev = EC_BASE, wsRev = WS_BASE;
  rows.push({yr:2025, ecRev, wsRev, ecGrow:0, wsGrow:0, ecBonus:0, wsBonus:0, total:BASE});
  for(let i=0;i<5;i++) {
    ecRev = ecRev*(1+ec[i]/100);
    wsRev = wsRev*(1+ws[i]/100);
    const ecBonus = calcECBonus(ecRev);
    const wsBonus = calcWSBonus(wsRev);
    const total = BASE+ecBonus+wsBonus;
    rows.push({yr:YEARS[i+1], ecRev, wsRev, ecGrow:ec[i], wsGrow:ws[i], ecBonus, wsBonus, total});
  }
  return rows;
}

let chart;

function render() {
  const rows = calcRows();
  const last = rows[rows.length-1];

  document.getElementById('metrics').innerHTML = [
    {label:'Year 5 EC revenue', val:fmtM(last.ecRev), sub:'from $6.0M baseline'},
    {label:'Year 5 WS revenue', val:fmtM(last.wsRev), sub:'from $6.0M baseline'},
    {label:'Year 5 EC bonus', val:fmt(last.ecBonus), sub:'incremental above $6M'},
    {label:'Year 5 total comp', val:fmt(last.total), sub:pct(last.total, last.ecRev+last.wsRev)+' of combined rev'},
  ].map(c=>`<div class="metric"><div class="mlabel">${c.label}</div><div class="mval">${c.val}</div><div class="msub">${c.sub}</div></div>`).join('');

  document.getElementById('tbody').innerHTML = rows.map((r,i)=>`
    <tr class="${i===0?'base-row':''}">
      <td>${r.yr}${i===0?' (baseline)':''}</td>
      <td>${fmtM(r.ecRev)}</td>
      <td>${i===0?'—':gpct(r.ecGrow)}</td>
      <td>${i===0?'—':'<span class="pos">'+fmt(r.ecBonus)+'</span>'}</td>
      <td>${fmtM(r.wsRev)}</td>
      <td>${i===0?'—':gpct(r.wsGrow)}</td>
      <td>${i===0?'—':'<span class="pos">'+fmt(r.wsBonus)+'</span>'}</td>
      <td>${i===0?fmt(BASE):'<span class="pos">'+fmt(r.total)+'</span>'}</td>
      <td>${pct(r.total,r.ecRev+r.wsRev)}</td>
    </tr>`).join('');

  const labels = rows.map(r=>String(r.yr));
  const baseArr = rows.map(()=>BASE);
  const ecArr = rows.map(r=>Math.round(r.ecBonus));
  const wsArr = rows.map(r=>Math.round(r.wsBonus));

  if(chart) {
    chart.data.datasets[0].data = baseArr;
    chart.data.datasets[1].data = wsArr;
    chart.data.datasets[2].data = ecArr;
    chart.update();
  } else {
    chart = new Chart(document.getElementById('mainChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {label:'Base retainer', data:baseArr, backgroundColor:'#D3D1C7', stack:'s'},
          {label:'Wholesale bonus', data:wsArr, backgroundColor:'#1D9E75', stack:'s'},
          {label:'E-commerce bonus', data:ecArr, backgroundColor:'#185FA5', stack:'s'},
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        animation: { duration: 250 },
        plugins: {
          legend:{display:false},
          tooltip:{ callbacks:{ label: ctx=>' '+ctx.dataset.label+': $'+Math.round(ctx.raw).toLocaleString() }}
        },
        scales: {
          x:{stacked:true, ticks:{autoSkip:false}},
          y:{stacked:true, ticks:{callback: v=>'$'+(v/1000).toFixed(0)+'K'}}
        }
      }
    });
  }
}

for(let i=0;i<5;i++) {
  ['ec','ws'].forEach(ch => {
    const slider = document.getElementById(ch+i);
    const valEl = document.getElementById(ch+'v'+i);
    slider.addEventListener('input', () => {
      valEl.textContent = slider.value+'%';
      render();
    });
  });
}

render();
</script>
